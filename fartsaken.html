<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEON JUMPER: TRILOGY</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #050510; overflow: hidden; font-family: 'Courier New', Courier, monospace; user-select: none; }
        canvas { display: block; }
        
        #hud { position: absolute; top: 20px; left: 20px; pointer-events: none; z-index: 10; display: flex; flex-direction: column; gap: 5px; }
        .hud-text { font-size: 24px; font-weight: bold; color: #fff; text-shadow: 2px 2px 0 #000; }
        #score-display { color: #ffcc00; }
        #level-display { color: #00ffff; font-size: 32px; letter-spacing: 2px; }
        .controls-hint { font-size: 14px; color: #aaa; margin-top: 10px; }
        
        #message-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 20; }
        #message-title { font-size: 80px; font-weight: bold; color: #00ffff; text-shadow: 0 0 20px #00ffff; margin-bottom: 20px; letter-spacing: 5px; text-transform: uppercase; text-align: center; }
        .btn { background: #00ffff; color: #000; border: none; padding: 15px 40px; font-size: 24px; font-weight: bold; cursor: pointer; transition: 0.2s; text-transform: uppercase; border-radius: 5px; margin-top: 20px; }
        .btn:hover { background: #fff; transform: scale(1.05); }
    </style>
</head>
<body>

    <div id="hud">
        <div id="level-display">LEVEL 1</div>
        <div class="hud-text">COINS: <span id="score-display">0</span></div>
        <div class="controls-hint">WASD/ARROWS: Move & Jump | SHIFT: Dash | S/DOWN: Fast Fall</div>
    </div>

    <div id="message-screen">
        <div id="message-title">LEVEL COMPLETE!</div>
        <button class="btn" id="action-btn" onclick="nextAction()">CONTINUE</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();

        // Inputs
        const keys = { left: false, right: false, down: false, jump: false, dash: false };
        window.addEventListener('keydown', e => {
            if(e.code === 'KeyA' || e.code === 'ArrowLeft') keys.left = true;
            if(e.code === 'KeyD' || e.code === 'ArrowRight') keys.right = true;
            if(e.code === 'KeyS' || e.code === 'ArrowDown') keys.down = true;
            if(e.code === 'ShiftLeft' || e.code === 'ShiftRight') { if(!keys.dash) handleDash(); keys.dash = true; }
            if(e.code === 'KeyW' || e.code === 'ArrowUp' || e.code === 'Space') { if(!keys.jump) handleJump(); keys.jump = true; }
        });
        window.addEventListener('keyup', e => {
            if(e.code === 'KeyA' || e.code === 'ArrowLeft') keys.left = false;
            if(e.code === 'KeyD' || e.code === 'ArrowRight') keys.right = false;
            if(e.code === 'KeyS' || e.code === 'ArrowDown') keys.down = false;
            if(e.code === 'ShiftLeft' || e.code === 'ShiftRight') keys.dash = false;
            if(e.code === 'KeyW' || e.code === 'ArrowUp' || e.code === 'Space') keys.jump = false;
        });

        // Game State
        let isGameOver = false;
        let score = 0;
        let currentLevel = 0; // 0 = Lvl 1, 1 = Lvl 2, 2 = Lvl 3
        let camera = { x: 0, y: 0 };
        let screenShake = 0;
        let particles = [];
        let trails = [];

        // Physics Constants
        const GRAVITY = 1400;
        const JUMP_FORCE = 650;
        const MOVE_SPEED = 400;
        const WALL_SLIDE_SPEED = 150;
        const DASH_SPEED = 1200;

        // Player Object
        let player = {
            x: 100, y: 100, w: 30, h: 30, vx: 0, vy: 0,
            color: '#00ffff', grounded: false, jumpsLeft: 1, 
            wallSliding: false, wallDir: 0, facing: 1,
            isDashing: false, dashTime: 0, dashCd: 0
        };

        // Level Entities
        let platforms = []; let coins = []; let spikes = []; let enemies = []; let goal = { x: 0, y: 0, w: 80, h: 80 };

        const LEVEL_DATA = [
            { // LEVEL 1: The Basics
                platforms: [
                    { x: 0, y: 500, w: 800, h: 500, color: '#222' },
                    { x: 1000, y: 400, w: 400, h: 600, color: '#222' },
                    { x: 1600, y: 250, w: 300, h: 750, color: '#222' },
                    { x: 2100, y: 500, w: 600, h: 500, color: '#222' },
                    { x: 400, y: 200, w: 50, h: 300, color: '#333' } // Wall jump tutorial
                ],
                spikes: [ { x: 800, y: 950, w: 200, h: 50 } ], // Pit spikes
                coins: [ { x: 425, y: 150, r: 10 }, { x: 1200, y: 350, r: 10 }, { x: 1750, y: 200, r: 10 } ],
                enemies: [ { x: 600, y: 470, w: 30, h: 30, vx: -100, startX: 500, endX: 750, dead: false } ],
                goal: { x: 2500, y: 420 }
            },
            { // LEVEL 2: Dash Mastery
                platforms: [
                    { x: 0, y: 500, w: 600, h: 500, color: '#222' },
                    { x: 1100, y: 500, w: 200, h: 500, color: '#222' }, // Huge gap needs dash
                    { x: 1800, y: 300, w: 150, h: 20, color: '#444' }, // Floating
                    { x: 2200, y: 150, w: 150, h: 20, color: '#444' },
                    { x: 2700, y: 500, w: 500, h: 500, color: '#222' }
                ],
                spikes: [ { x: 600, y: 950, w: 500, h: 50 }, { x: 1300, y: 950, w: 1400, h: 50 } ], 
                coins: [ { x: 850, y: 450, r: 10 }, { x: 1875, y: 250, r: 10 }, { x: 2275, y: 100, r: 10 } ],
                enemies: [ { x: 2800, y: 470, w: 30, h: 30, vx: -150, startX: 2750, endX: 3000, dead: false } ],
                goal: { x: 3000, y: 420 }
            },
            { // LEVEL 3: The Gauntlet
                platforms: [
                    { x: 0, y: 500, w: 400, h: 500, color: '#222' },
                    { x: 700, y: 100, w: 50, h: 400, color: '#333' }, // High Wall
                    { x: 1000, y: 600, w: 300, h: 400, color: '#222' },
                    { x: 1500, y: 400, w: 100, h: 20, color: '#444' },
                    { x: 1800, y: 200, w: 100, h: 20, color: '#444' },
                    { x: 2200, y: 600, w: 800, h: 400, color: '#222' }
                ],
                spikes: [ 
                    { x: 400, y: 950, w: 1800, h: 50 }, // Ocean of spikes
                    { x: 1050, y: 570, w: 200, h: 30 }, // Spikes on platform
                    { x: 2400, y: 570, w: 400, h: 30 }
                ], 
                coins: [ { x: 725, y: 50, r: 10 }, { x: 1550, y: 350, r: 10 }, { x: 1850, y: 150, r: 10 }, { x: 2500, y: 450, r: 10 } ],
                enemies: [ 
                    { x: 1100, y: 300, w: 30, h: 30, vx: 0, startX: 1100, endX: 1100, dead: false }, // Mid-air enemy to bounce on!
                    { x: 2300, y: 570, w: 30, h: 30, vx: -200, startX: 2250, endX: 2350, dead: false } 
                ],
                goal: { x: 2800, y: 520 }
            }
        ];

        function loadLevel(index) {
            let data = LEVEL_DATA[index];
            platforms = JSON.parse(JSON.stringify(data.platforms));
            spikes = JSON.parse(JSON.stringify(data.spikes));
            coins = JSON.parse(JSON.stringify(data.coins));
            enemies = JSON.parse(JSON.stringify(data.enemies));
            goal.x = data.goal.x; goal.y = data.goal.y;
            
            player.x = 100; player.y = 300; player.vx = 0; player.vy = 0; player.dashCd = 0; player.facing = 1;
            document.getElementById('level-display').innerText = `LEVEL ${index + 1}`;
            isGameOver = false; trails = []; particles = [];
            document.getElementById('message-screen').style.display = 'none';
        }

        function handleJump() {
            if (isGameOver || player.isDashing) return;
            if (player.wallSliding) {
                player.vy = -JUMP_FORCE * 1.1; player.vx = player.wallDir * -MOVE_SPEED * 1.5;
                player.jumpsLeft = 1; player.facing = -player.wallDir;
                createParticles(player.x + (player.wallDir === 1 ? player.w : 0), player.y + player.h/2, '#fff', 15);
            } else if (player.grounded) {
                player.vy = -JUMP_FORCE; player.grounded = false; player.jumpsLeft = 1;
                createParticles(player.x + player.w/2, player.y + player.h, '#00ffff', 10);
            } else if (player.jumpsLeft > 0) {
                player.vy = -JUMP_FORCE * 0.9; player.jumpsLeft--;
                createParticles(player.x + player.w/2, player.y + player.h, '#00ffff', 20);
            }
        }

        function handleDash() {
            if (isGameOver || player.dashCd > 0 || player.wallSliding) return;
            player.isDashing = true; player.dashTime = 0.15; player.dashCd = 1.0; player.vy = 0;
            screenShake = 10; createParticles(player.x + player.w/2, player.y + player.h/2, '#00ffff', 20);
        }

        function createParticles(x, y, color, count) {
            for(let i=0; i<count; i++) particles.push({ x: x, y: y, vx: (Math.random() - 0.5) * 400, vy: (Math.random() - 0.5) * 400, life: 1.0, color: color, size: Math.random() * 6 + 2 });
        }
        function rectIntersect(r1, r2) { return !(r2.x > r1.x + r1.w || r2.x + r2.w < r1.x || r2.y > r1.y + r1.h || r2.y + r2.h < r1.y); }

        function die() {
            isGameOver = true; screenShake = 30;
            createParticles(player.x + player.w/2, player.y + player.h/2, '#ff0055', 50);
            document.getElementById('message-title').innerText = "YOU DIED";
            document.getElementById('message-title').style.color = "#ff0055";
            document.getElementById('action-btn').innerText = "RETRY LEVEL";
            document.getElementById('message-screen').style.display = 'flex';
        }

        function win() {
            isGameOver = true; score += 100; document.getElementById('score-display').innerText = score;
            createParticles(player.x + player.w/2, player.y + player.h/2, '#00ff00', 50);
            if (currentLevel < LEVEL_DATA.length - 1) {
                document.getElementById('message-title').innerText = "AREA CLEARED";
                document.getElementById('message-title').style.color = "#00ff00";
                document.getElementById('action-btn').innerText = "NEXT LEVEL";
            } else {
                document.getElementById('message-title').innerText = "GAME COMPLETED!";
                document.getElementById('message-title').style.color = "#ffcc00";
                document.getElementById('action-btn').innerText = "PLAY AGAIN";
            }
            document.getElementById('message-screen').style.display = 'flex';
        }

        function nextAction() {
            if (document.getElementById('message-title').innerText === "YOU DIED") loadLevel(currentLevel);
            else if (currentLevel < LEVEL_DATA.length - 1) { currentLevel++; loadLevel(currentLevel); }
            else { currentLevel = 0; score = 0; document.getElementById('score-display').innerText = score; loadLevel(0); }
            lastTime = performance.now(); requestAnimationFrame(gameLoop);
        }

        let lastTime = performance.now();

        function gameLoop(timestamp) {
            if (isGameOver && particles.length === 0) return;
            let dt = (timestamp - lastTime) / 1000; if(dt > 0.1) dt = 0.1; lastTime = timestamp;

            if (!isGameOver) {
                if (player.dashCd > 0) player.dashCd -= dt;

                // Dash Logic
                if (player.isDashing) {
                    player.dashTime -= dt;
                    player.vx = DASH_SPEED * player.facing;
                    player.vy = 0; // Defy gravity
                    trails.push({ x: player.x, y: player.y, life: 0.5 });
                    if (player.dashTime <= 0) { player.isDashing = false; player.vx *= 0.5; }
                } else {
                    // Normal Movement
                    let targetVx = 0;
                    if (keys.left) { targetVx = -MOVE_SPEED; player.facing = -1; }
                    if (keys.right) { targetVx = MOVE_SPEED; player.facing = 1; }
                    let accel = player.grounded ? 2500 : 1200; 
                    player.vx += (targetVx - player.vx) * accel * dt;
                }
                
                player.x += player.vx * dt;

                // X Collision
                player.wallSliding = false; player.wallDir = 0;
                for (let p of platforms) {
                    if (rectIntersect(player, p)) {
                        if (player.vx > 0) { player.x = p.x - player.w; player.vx = 0; if (keys.right && player.vy > 0 && !player.isDashing) { player.wallSliding = true; player.wallDir = 1; } } 
                        else if (player.vx < 0) { player.x = p.x + p.w; player.vx = 0; if (keys.left && player.vy > 0 && !player.isDashing) { player.wallSliding = true; player.wallDir = -1; } }
                    }
                }

                // Vertical Movement (Fast Fall & Gravity)
                if (!player.isDashing) {
                    if (player.wallSliding) { player.vy = WALL_SLIDE_SPEED; if(Math.random() < 0.2) createParticles(player.x + (player.wallDir===1?player.w:0), player.y+player.h/2, '#fff', 1); } 
                    else if (keys.down && !player.grounded) { player.vy += GRAVITY * 3 * dt; } // FAST FALL
                    else { player.vy += GRAVITY * dt; }
                }
                player.y += player.vy * dt;

                // Y Collision
                player.grounded = false;
                for (let p of platforms) {
                    if (rectIntersect(player, p)) {
                        if (player.vy > 0) { player.y = p.y - player.h; player.vy = 0; player.grounded = true; player.jumpsLeft = 1; player.isDashing = false; } 
                        else if (player.vy < 0) { player.y = p.y + p.h; player.vy = 0; }
                    }
                }

                if (player.y > 1500) die();

                // Hazards & Collectibles
                for (let s of spikes) { let hitbox = {x: s.x+5, y: s.y+10, w: s.w-10, h: s.h-10}; if (rectIntersect(player, hitbox)) die(); }
                for (let c of coins) {
                    if (!c.collected && Math.hypot((player.x+player.w/2) - c.x, (player.y+player.h/2) - c.y) < player.w/2 + c.r) {
                        c.collected = true; score += 20; document.getElementById('score-display').innerText = score;
                        createParticles(c.x, c.y, '#ffcc00', 15);
                    }
                }

                // Enemies
                for (let e of enemies) {
                    if (e.dead) continue;
                    e.x += e.vx * dt;
                    if (e.x < e.startX) { e.x = e.startX; e.vx *= -1; } if (e.x > e.endX) { e.x = e.endX; e.vx *= -1; }
                    if (rectIntersect(player, e)) {
                        if (player.vy > 0 && player.y + player.h/2 < e.y) { // Stomp
                            e.dead = true; player.vy = -JUMP_FORCE * 1.1; player.jumpsLeft = 1; player.dashCd = 0; screenShake = 8;
                            createParticles(e.x + e.w/2, e.y + e.h/2, '#ff0055', 30);
                        } else { die(); }
                    }
                }

                if (rectIntersect(player, goal)) win();

                // Camera & Shake
                camera.x += ((player.x - canvas.width / 2.5) - camera.x) * 6 * dt;
                camera.y += ((player.y - canvas.height / 1.5) - camera.y) * 6 * dt;
            }

            // Visual Updates
            for (let i = particles.length - 1; i >= 0; i--) { let p = particles[i]; p.x += p.vx * dt; p.y += p.vy * dt; p.life -= dt * 2; if (p.life <= 0) particles.splice(i, 1); }
            for (let i = trails.length - 1; i >= 0; i--) { trails[i].life -= dt * 3; if (trails[i].life <= 0) trails.splice(i, 1); }
            if (screenShake > 0) screenShake *= 0.9;

            // --- RENDER ---
            ctx.fillStyle = '#050510'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.save(); 
            let sx = (Math.random()-0.5)*screenShake; let sy = (Math.random()-0.5)*screenShake;
            ctx.translate(-camera.x + sx, -camera.y + sy);

            for (let p of platforms) { ctx.fillStyle = p.color; ctx.strokeStyle = '#00ffff'; ctx.lineWidth = 2; ctx.fillRect(p.x, p.y, p.w, p.h); ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(p.x + p.w, p.y); ctx.stroke(); }
            
            ctx.fillStyle = '#ff0055';
            for (let s of spikes) { for(let i=0; i<s.w; i+=15) { ctx.beginPath(); ctx.moveTo(s.x + i, s.y + s.h); ctx.lineTo(s.x + i + 7.5, s.y); ctx.lineTo(s.x + i + 15, s.y + s.h); ctx.fill(); } }
            
            for (let c of coins) { if (!c.collected) { ctx.fillStyle = '#ffcc00'; ctx.shadowColor = '#ffcc00'; ctx.shadowBlur = 10; ctx.beginPath(); ctx.arc(c.x, c.y + Math.sin(timestamp/200)*5, c.r, 0, Math.PI*2); ctx.fill(); ctx.shadowBlur = 0; } }
            
            for (let e of enemies) { if(!e.dead) { ctx.fillStyle = '#ff0055'; ctx.fillRect(e.x, e.y, e.w, e.h); ctx.fillStyle = '#fff'; ctx.fillRect(e.x + (e.vx > 0 ? 15 : 5), e.y + 5, 10, 10); } }
            
            ctx.fillStyle = 'rgba(0, 255, 0, 0.2)'; ctx.strokeStyle = '#00ff00'; ctx.lineWidth = 4; ctx.shadowColor = '#00ff00'; ctx.shadowBlur = 20; ctx.fillRect(goal.x, goal.y, goal.w, goal.h); ctx.strokeRect(goal.x, goal.y, goal.w, goal.h); ctx.shadowBlur = 0;
            
            for (let t of trails) { ctx.globalAlpha = Math.max(0, t.life); ctx.fillStyle = player.color; ctx.fillRect(t.x, t.y, player.w, player.h); } ctx.globalAlpha = 1.0;
            for (let p of particles) { ctx.globalAlpha = Math.max(0, p.life); ctx.fillStyle = p.color; ctx.fillRect(p.x, p.y, p.size, p.size); } ctx.globalAlpha = 1.0;

            if (!isGameOver) {
                ctx.fillStyle = player.color; ctx.shadowColor = player.color; ctx.shadowBlur = player.dashCd > 0 ? 0 : 15; // Glow turns off when dash on cooldown
                let scaleX = 1.0; let scaleY = 1.0;
                if (player.isDashing) { scaleX = 1.4; scaleY = 0.6; }
                else if (!player.grounded && !player.wallSliding) { if (Math.abs(player.vy) > 100) { scaleX = 0.8; scaleY = 1.2; } } 
                else if (player.grounded && Math.abs(player.vx) > 10) { scaleX = 1.2; scaleY = 0.8; }
                
                ctx.save(); ctx.translate(player.x + player.w/2, player.y + player.h); ctx.scale(scaleX, scaleY); ctx.fillRect(-player.w/2, -player.h, player.w, player.h);
                if(player.wallSliding) { ctx.fillStyle = 'rgba(0, 255, 255, 0.3)'; ctx.fillRect(-player.w/2, -player.h - 10, player.w, player.h); }
                ctx.restore(); ctx.shadowBlur = 0;
            }

            ctx.restore(); requestAnimationFrame(gameLoop);
        }

        loadLevel(currentLevel); requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
